name: Build debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Init submodules (skip HuggingFace rate-limited model)
        run: |
          git submodule update --init --depth=1 java/assets/layouts
          git submodule update --init --depth=1 java/assets/themes
          git submodule update --init --depth=1 java/res-large
          git submodule update --init --depth=1 libs
          git submodule update --init --depth=1 translations
          git submodule update --init --depth=1 voiceinput-shared/src/main/ml
          git submodule update --init --depth=1 java/assets/futo-swipe || echo "futo-swipe unavailable, skipping"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Find APKs
        run: find . -name "*.apk" -path "*/debug/*" | head -20

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FutoKeyboard-debug
          path: |
            **/build/outputs/apk/**/debug/*.apk
          if-no-files-found: warn

      - name: Archive reports on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: reports
          path: '*/build/reports'
